    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#2f2422" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>

