<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Mars fashion atelier</title>
  <desc id="desc">A modern fashion design studio with mannequins, garments, fabric, and warm editorial lighting.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4e2"/>
      <stop offset="0.45" stop-color="#ead5c2"/>
      <stop offset="1" stop-color="#382a26"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1a1514"/>
      <stop offset="0.52" stop-color="#5b3e36"/>
      <stop offset="1" stop-color="#211817"/>
    </linearGradient>
    <linearGradient id="dressA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5ded0"/>
      <stop offset="0.52" stop-color="#b95b52"/>
      <stop offset="1" stop-color="#4b1f24"/>
    </linearGradient>
    <linearGradient id="dressB" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#244d4a"/>
      <stop offset="0.65" stop-color="#0f2f2d"/>
      <stop offset="1" stop-color="#101414"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f2d98c"/>
      <stop offset="1" stop-color="#a87728"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
